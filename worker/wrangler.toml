name = "pv-reisli-travel-conditions"
main = "travel-conditions.js"
compatibility_date = "2025-01-01"

# Secrets werden NICHT hier abgelegt, sondern via:
#   wrangler secret put SECRET_WEATHER_LAT
#   wrangler secret put SECRET_WEATHER_LON
#   wrangler secret put SECRET_WEATHER_TZ
#
# Lokale Entwicklung: lege eine `.dev.vars` (gitignored) im selben Ordner an:
#   SECRET_WEATHER_LAT=...
#   SECRET_WEATHER_LON=...
#   SECRET_WEATHER_TZ=...
#
# Routen werden im Cloudflare-Dashboard oder per `routes`-Block gesetzt,
# z. B.:
# routes = [
#   { pattern = "pv-reisli-2026.pages.dev/api/travel-conditions", zone_id = "..." }
# ]
