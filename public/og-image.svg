<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 630"
  width="1200"
  height="630"
  role="img"
  aria-label="PV-Reisli 2026, Es wird ernst!"
>
  <defs>
    <radialGradient id="ogBg" cx="50%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#173052" />
      <stop offset="100%" stop-color="#0b223d" />
    </radialGradient>
    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d57a30" />
      <stop offset="100%" stop-color="#b85a1f" />
    </linearGradient>
    <radialGradient id="discGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#173052" />
      <stop offset="100%" stop-color="#0b223d" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ogBg)" />

  <!-- Doppelter Goldrahmen im Plakat-Stil -->
  <rect x="22" y="22" width="1156" height="586" rx="16"
        fill="none" stroke="#b88a3b" stroke-width="3" />
  <rect x="40" y="40" width="1120" height="550" rx="12"
        fill="none" stroke="#b88a3b" stroke-opacity="0.4" stroke-width="1" />

  <!-- Oberer Stempel -->
  <g transform="translate(600 96)">
    <rect x="-170" y="-22" width="340" height="40" rx="20"
          fill="none" stroke="#b88a3b" stroke-opacity="0.7" />
    <text x="0" y="6" font-family="Georgia, serif" font-size="14"
          letter-spacing="5" text-anchor="middle" fill="#d8b06a">
      GEHEIME MISSION
    </text>
  </g>

  <text x="600" y="160" font-family="Georgia, serif" font-size="18"
        letter-spacing="6" text-anchor="middle" fill="#d8b06a">
    PEGELSPITZE REISEN PRÄSENTIERT
  </text>

  <!-- Haupttitel -->
  <text x="600" y="310" font-family="Georgia, serif" font-weight="900"
        font-size="150" letter-spacing="-3" text-anchor="middle"
        fill="#f7ecd1">
    PV-Reisli
  </text>
  <text x="600" y="420" font-family="Georgia, serif" font-style="italic"
        font-weight="700" font-size="110" text-anchor="middle"
        fill="#d8b06a">
    2026
  </text>

  <!-- Orangefarbenes Ribbon -->
  <g transform="translate(600 488) rotate(-1.5)">
    <path d="M -210 0 L -190 -22 L 190 -22 L 210 0 L 190 22 L -190 22 Z"
          fill="url(#ribbonGrad)" />
    <path d="M -210 0 L -190 -22 L -190 22 Z"
          fill="#7d3810" />
    <path d="M 210 0 L 190 -22 L 190 22 Z"
          fill="#7d3810" />
    <text x="0" y="10" font-family="Georgia, serif" font-style="italic"
          font-weight="800" font-size="36" text-anchor="middle"
          fill="#fff7e3">
      Es wird ernst!
    </text>
  </g>

  <!-- Tagline -->
  <text x="600" y="560" font-family="Georgia, serif" font-style="italic"
        font-size="22" text-anchor="middle" fill="#d8b06a">
    Mit Stil, Humor und solider Durstplanung
  </text>

  <!-- Markenscheibe rechts unten -->
  <g transform="translate(1080 540)">
    <circle r="50" fill="url(#discGrad)" stroke="#b88a3b" stroke-width="2" />
    <circle r="42" fill="none" stroke="#b88a3b" stroke-opacity="0.35"
            stroke-dasharray="2 3" />
    <text y="6" font-family="Georgia, serif" font-weight="900"
          font-size="32" text-anchor="middle" fill="#f7ecd1">
      PV
    </text>
  </g>

  <!-- Datum links unten -->
  <text x="120" y="555" font-family="Georgia, serif" font-size="20"
        letter-spacing="4" fill="#d8b06a">
    30.05.2026
  </text>
</svg>
