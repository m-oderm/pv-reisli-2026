<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 180 180"
  width="180"
  height="180"
  role="img"
  aria-label="PV-Reisli 2026"
>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#173052" />
      <stop offset="100%" stop-color="#0b223d" />
    </radialGradient>
  </defs>

  <!-- iOS maskiert die Ecken selbst, deshalb voller Hintergrund -->
  <rect width="180" height="180" fill="url(#bg)" />

  <!-- Goldener Ring -->
  <circle cx="90" cy="90" r="74" fill="none" stroke="#b88a3b" stroke-width="3" />
  <circle cx="90" cy="90" r="66" fill="none" stroke="#b88a3b"
          stroke-opacity="0.35" stroke-dasharray="2 3" />

  <!-- PV Monogramm, vertikal zentriert -->
  <text x="90" y="120" font-family="Georgia, serif" font-weight="900"
        font-size="86" letter-spacing="-3" text-anchor="middle"
        fill="#f7ecd1">
    PV
  </text>
</svg>
